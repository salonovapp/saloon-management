version: '3.9'

services:
  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saloon_app
    restart: unless-stopped
    working_dir: /app
    expose:
      - "9000"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - APP_NAME=${APP_NAME:-"Saloon Management"}
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-saloon_db}
      - DB_USERNAME=${DB_USERNAME:-saloon_user}
      - DB_PASSWORD=${DB_PASSWORD:-saloon_password}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-"hello@example.com"}
      - MAIL_FROM_NAME=${APP_NAME:-"Saloon Management"}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-database}
      - CACHE_STORE=${CACHE_STORE:-redis}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_BUCKET=${AWS_BUCKET}
    volumes:
      - ./:/app
      - ./storage/docker/logs/php:/var/log/php
      - /app/node_modules
      - /app/vendor
    networks:
      - saloon_network
    depends_on:
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: saloon_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./:/app
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./storage/docker/logs/nginx:/var/log/nginx
    networks:
      - saloon_network
    depends_on:
      - app
    environment:
      - APP_URL=${APP_URL:-http://localhost}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: saloon_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-redis_password}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - saloon_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: saloon_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-saloon_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-saloon_password}
      MYSQL_USER: ${DB_USERNAME:-saloon_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-saloon_password}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - saloon_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME:-saloon_user}", "-p${DB_PASSWORD:-saloon_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit Email Testing Service
  mailpit:
    image: axllent/mailpit:latest
    container_name: saloon_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    networks:
      - saloon_network
    environment:
      MP_MAX_MESSAGES: 5000
      MP_RETENTION: 12h
      MP_SMTP_AUTH_ACCEPT_ANY: 1

  # PhpMyAdmin for Database Management
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: saloon_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-saloon_user}
      PMA_PASSWORD: ${DB_PASSWORD:-saloon_password}
      PMA_ROOT_PASSWORD: ${DB_PASSWORD:-saloon_password}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - saloon_network
    depends_on:
      - db

volumes:
  redis_data:
    driver: local
  mysql_data:
    driver: local

networks:
  saloon_network:
    driver: bridge
